services:
  postgres:
    image: postgres:15-alpine
    container_name: octopos-postgres
    environment:
      POSTGRES_USER: octopos
      POSTGRES_PASSWORD: octopos
      POSTGRES_DB: octopos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octopos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
