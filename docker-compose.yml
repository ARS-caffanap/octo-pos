services:
  # ── PostgreSQL 15 ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: octopos-postgres
    environment:
      POSTGRES_USER: octopos
      POSTGRES_PASSWORD: octopos
      POSTGRES_DB: octopos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octopos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Backend (Go API) ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: octopos-backend
    ports:
      - "2323:8080"
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: octopos
      DB_PASSWORD: octopos
      DB_NAME: octopos
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Frontend (Next.js) ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: octopos-frontend
    command: ["sh", "-c", "cd /app/frontend && npx next start -p 3000"]
    ports:
      - "3232:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:2323/api/v1
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
