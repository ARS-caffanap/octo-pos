basePath: /api/v1
definitions:
  models.CreateProductRequest:
    properties:
      category:
        maxLength: 100
        type: string
      low_stock_threshold:
        minimum: 0
        type: integer
      name:
        maxLength: 255
        minLength: 1
        type: string
      price:
        minimum: 0
        type: number
      sku:
        maxLength: 100
        minLength: 1
        type: string
      status:
        enum:
        - active
        - inactive
        type: string
      stock_quantity:
        minimum: 0
        type: integer
    required:
    - name
    - price
    - sku
    type: object
  models.Product:
    properties:
      category:
        type: string
      created_at:
        type: string
      id:
        type: integer
      low_stock_threshold:
        type: integer
      name:
        type: string
      price:
        type: number
      sku:
        type: string
      status:
        type: string
      stock_quantity:
        type: integer
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  models.ProductListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Product'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  models.UpdateProductRequest:
    properties:
      category:
        maxLength: 100
        type: string
      low_stock_threshold:
        minimum: 0
        type: integer
      name:
        maxLength: 255
        minLength: 1
        type: string
      price:
        minimum: 0
        type: number
      sku:
        maxLength: 100
        minLength: 1
        type: string
      status:
        enum:
        - active
        - inactive
        type: string
      stock_quantity:
        minimum: 0
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: dev@octopos.example.com
    name: OctoPOS Team
  description: |-
    REST API for OctoPOS — a point-of-sale and inventory management system.
    This API provides endpoints for authentication, product management,
    transaction processing, and inventory tracking.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: OctoPOS API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns 200 OK when the service is running. Used by load balancers
        and monitoring tools.
      produces:
      - application/json
      responses:
        "200":
          description: 'status: ok'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /products:
    get:
      description: Returns a paginated, filtered list of products for the authenticated
        tenant.
      parameters:
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Filter by status (active, inactive)
        in: query
        name: status
        type: string
      - description: Filter low stock products
        in: query
        name: low_stock
        type: boolean
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ProductListResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List products
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Creates a new product for the authenticated tenant.
      parameters:
      - description: Product data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a product
      tags:
      - Products
  /products/{id}:
    delete:
      description: Sets a product's status to inactive (soft delete) for the authenticated
        tenant.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a product (soft delete)
      tags:
      - Products
    get:
      description: Returns a single product by ID for the authenticated tenant.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a product
      tags:
      - Products
    put:
      consumes:
      - application/json
      description: Updates an existing product for the authenticated tenant.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a product
      tags:
      - Products
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Health check endpoints
  name: Health
- description: Authentication and authorization endpoints
  name: Auth
- description: Product management endpoints
  name: Products
- description: Transaction processing endpoints
  name: Transactions
- description: Inventory tracking endpoints
  name: Inventory
